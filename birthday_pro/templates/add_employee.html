{% extends "base.html" %}
{% block title %}Add Employee{% endblock %}
{% block page_title %}Add New Employee{% endblock %}
{% block content %}
<div style="max-width:560px;">
  <div class="card">
    <div class="card-header"><h3>Employee Details</h3></div>
    <div class="card-body">
      <form method="POST">
        <div class="form-row">
          <div class="form-group"><label>First Name</label><input type="text" name="first" placeholder="Priya" required></div>
          <div class="form-group"><label>Last Name</label><input type="text" name="last" placeholder="Sharma" required></div>
        </div>
        <div class="form-group"><label>Email Address</label><input type="email" name="email" placeholder="priya@company.com" required></div>
        <div class="form-row">
          <div class="form-group"><label>Birthday</label><input type="date" name="birthday" required></div>
          <div class="form-group">
            <label>Department</label>
            <select name="department">
              <option>Engineering</option><option>Design</option><option>Marketing</option>
              <option>Sales</option><option>HR</option><option>Finance</option>
              <option>Operations</option><option>Other</option>
            </select>
          </div>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary">Save Employee</button>
          <a href="{{ url_for('employees') }}" class="btn">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
